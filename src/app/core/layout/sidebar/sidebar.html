<nav class="sidebar" [class.expanded]="isExpanded$ | async">
  <!-- Toggle Button -->
  <div class="sidebar-header">
    <div class="logo-wrapper" *ngIf="isExpanded$ | async">
      <img src="/shared/ui/images/logo/logo-nova-horizonte-branca.png" alt="Nova Horizonte" class="logo">
    </div>
    <button class="toggle-btn" (click)="toggleSidebar()" [title]="(isExpanded$ | async) ? 'Collapse' : 'Expand'">
      <mat-icon>{{ (isExpanded$ | async) ? 'chevron_left' : 'chevron_right' }}</mat-icon>
    </button>
  </div>

  <!-- Menu Items -->
  <ul class="menu">
    <li *ngFor="let item of menuItems" [routerLink]="item.route" routerLinkActive="active">
      <mat-icon class="menu-icon">{{ item.icon }}</mat-icon>
      <span class="menu-label" *ngIf="isExpanded$ | async">{{ item.label }}</span>
    </li>
  </ul>

  <!-- Bottom Toggle (Optional) -->
  <div class="sidebar-footer" *ngIf="isExpanded$ | async">
    <button class="footer-btn">
      <mat-icon>settings</mat-icon>
      <span>ConfiguraĂ§Ă”es</span>
    </button>
  </div>
</nav>
